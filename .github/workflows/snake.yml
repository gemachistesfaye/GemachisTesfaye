name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: gemachistesfaye
          outputs: |
                     dist/github-contribution-grid-snake.svg?palette=github-light
                     dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#58A6FF&color_dots=#161B22,#0D1117,#21262D,#30363D,#58A6FF

      - name: Commit generated files
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update contribution snake animation"
          add: "dist"
